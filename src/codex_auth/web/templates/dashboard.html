<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Codex Auth Dashboard</title>
    <!-- Use Inter for standard text (Vercel aesthetic) and Geist Mono for code/logs (Claude Code aesthetic) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --surface-color: #111111;
            --border-color: #333;
            --text-main: #ededed;
            --text-muted: #a1a1aa;
            --accent-color: #3b82f6;
            
            --log-info: #3b82f6;
            --log-error: #ef4444;
            --log-warn: #eab308;
            
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'Fira Code', 'Geist Mono', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #000;
            color: var(--text-main);
            font-family: var(--font-sans);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Disconnected Banner */
        #disconnected-banner {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--log-error);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            z-index: 1000;
            display: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            align-items: center;
            gap: 8px;
        }

        /* macOS Style Terminal Window */
        .window {
            width: 100%;
            max-width: 1000px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            height: 85vh;
        }

        /* Top Bar */
        .titlebar {
            background-color: var(--surface-color);
            border-bottom: 1px solid var(--border-color);
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            position: relative;
        }

        .dots {
            display: flex;
            gap: 8px;
        }

        .dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
        }

        .dot.red { background-color: #ff5f56; }
        .dot.yellow { background-color: #ffbd2e; }
        .dot.green { background-color: #27c93f; }

        .tabs {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 16px;
        }

        .tab {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .tab:hover {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.1);
        }

        .tab.active {
            color: var(--text-main);
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Content Area */
        .content {
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .view {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            overflow-y: auto;
        }

        .view.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Logs View (Claude Code Aesthetic) */
        #logs-view {
            background-color: var(--bg-color);
            padding: 16px;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.6;
        }

        .log-line {
            margin-bottom: 4px;
            word-wrap: break-word;
        }

        .log-time {
            color: #666;
            margin-right: 12px;
        }

        .log-level {
            margin-right: 12px;
        }

        .log-level.info { color: var(--log-info); }
        .log-level.error { color: var(--log-error); font-weight: bold; }
        .log-level.warning { color: var(--log-warn); }

        .log-msg {
            color: #d4d4d4;
        }

        /* Usage View (Vercel Aesthetic) */
        #usage-view {
            padding: 32px;
        }

        .header {
            margin-bottom: 32px;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 14px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin-bottom: 32px;
        }

        .card {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 24px;
        }

        .card h3 {
            color: var(--text-muted);
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 12px;
        }

        .card .value {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: -0.02em;
            font-family: var(--font-mono);
        }

        .model-breakdown {
            background-color: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }

        .model-breakdown table {
            width: 100%;
            border-collapse: collapse;
        }

        .model-breakdown th, .model-breakdown td {
            text-align: left;
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        .model-breakdown th {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background-color: rgba(255, 255, 255, 0.02);
        }

        .model-breakdown td {
            font-size: 14px;
            font-family: var(--font-mono);
        }

        .model-breakdown tr:last-child td {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div id="disconnected-banner">
        <span>🔴</span> Proxy Disconnected - Reconnecting...
    </div>

    <div class="window">
        <!-- Top Bar -->
        <div class="titlebar">
            <div class="dots">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
            </div>
            <div class="tabs">
                <div class="tab active" onclick="switchTab('logs')">Terminal Logs</div>
                <div class="tab" onclick="switchTab('usage')">AI Usage</div>
            </div>
        </div>

        <!-- Content Area -->
        <div class="content">
            <!-- Logs View -->
            <div id="logs-view" class="view active">
                <!-- Logs injected via JS -->
            </div>

            <!-- Usage View -->
            <div id="usage-view" class="view">
                <div class="header">
                    <h1>Usage Analytics</h1>
                    <p>Track your AI token consumption across the proxy.</p>
                </div>
                
                <div class="grid">
                    <div class="card">
                        <h3>Total Cost Saved</h3>
                        <div class="value" id="total-cost">$0.00</div>
                    </div>
                    <div class="card">
                        <h3>Total Prompt Tokens</h3>
                        <div class="value" id="total-prompt">0</div>
                    </div>
                    <div class="card">
                        <h3>Total Comp. Tokens</h3>
                        <div class="value" id="total-completion">0</div>
                    </div>
                </div>

                <div class="header">
                    <h2 style="font-size: 18px; font-weight: 500; margin-bottom: 16px;">Model Breakdown</h2>
                </div>
                <div class="model-breakdown">
                    <table>
                        <thead>
                            <tr>
                                <th>Model</th>
                                <th>Prompt Tokens</th>
                                <th>Completion Tokens</th>
                                <th>Estimated Value</th>
                            </tr>
                        </thead>
                        <tbody id="model-table-body">
                            <!-- Rows injected via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Tab Switching
        function switchTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabId + '-view').classList.add('active');
        }

        // Live Logs Polling
        const logsContainer = document.getElementById('logs-view');
        let lastLogCount = 0;

        let isDisconnected = false;

        function setDisconnected(status) {
            if (isDisconnected !== status) {
                isDisconnected = status;
                document.getElementById('disconnected-banner').style.display = status ? 'flex' : 'none';
                if (status) {
                    console.error("Connection to proxy lost.");
                } else {
                    console.log("Connection to proxy restored.");
                }
            }
        }

        async function fetchLogs() {
            try {
                const res = await fetch('/api/logs');
                if (!res.ok) throw new Error("Server returned " + res.status);
                setDisconnected(false);
                const data = await res.json();
                const logs = data.logs || [];
                
                if (logs.length > lastLogCount) {
                    const newLogs = logs.slice(lastLogCount);
                    newLogs.forEach(log => {
                        const div = document.createElement('div');
                        div.className = 'log-line';
                        
                        const lvlClass = log.level.toLowerCase();
                        let lvlDisplay = '●';
                        
                        div.innerHTML = `
                            <span class="log-time">${log.time}</span>
                            <span class="log-level ${lvlClass}">${lvlDisplay}</span>
                            <span class="log-msg">${log.message}</span>
                        `;
                        logsContainer.appendChild(div);
                    });
                    lastLogCount = logs.length;
                    
                    // Auto scroll to bottom
                    logsContainer.scrollTop = logsContainer.scrollHeight;
                }
            } catch (e) {
                setDisconnected(true);
            }
        }

        // Usage Polling
        async function fetchUsage() {
            try {
                const res = await fetch('/api/usage');
                if (!res.ok) throw new Error("Server returned " + res.status);
                const usage = await res.json();
                
                const models = usage.models || {};
                let totalCost = 0;
                let totalPrompt = 0;
                let totalCompletion = 0;
                
                const tbody = document.getElementById('model-table-body');
                tbody.innerHTML = '';
                
                for (const [model, stats] of Object.entries(models)) {
                    totalPrompt += stats.prompt_tokens;
                    totalCompletion += stats.completion_tokens;
                    totalCost += stats.estimated_cost;
                    
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td style="color: #fff;">${model}</td>
                        <td>${stats.prompt_tokens.toLocaleString()}</td>
                        <td>${stats.completion_tokens.toLocaleString()}</td>
                        <td style="color: #27c93f;">$${stats.estimated_cost.toFixed(4)}</td>
                    `;
                    tbody.appendChild(tr);
                }
                
                document.getElementById('total-cost').textContent = `$${totalCost.toFixed(2)}`;
                document.getElementById('total-prompt').textContent = totalPrompt.toLocaleString();
                document.getElementById('total-completion').textContent = totalCompletion.toLocaleString();
                
            } catch (e) {
                console.error("Failed to fetch usage:", e);
            }
        }

        // Init
        fetchUsage();
        fetchLogs();
        
        // Poll logs every 1 second
        setInterval(fetchLogs, 1000);
        // Poll usage every 5 seconds
        setInterval(fetchUsage, 5000);
    </script>
</body>
</html>
