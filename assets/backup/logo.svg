<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 120" width="500" height="120">
  <style>
    .font-base {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 64px;
      fill: #0A0A0A;
    }
    .weight-heavy {
      font-weight: 900;
      letter-spacing: -2.5px;
    }
    .weight-light {
      font-weight: 300;
      letter-spacing: -1px;
    }
  </style>

  <!-- Left Text: 'code' (Heavy Sans-Serif, perfectly kerned) -->
  <text x="216" y="74" class="font-base weight-heavy" text-anchor="end">code</text>

  <!-- Integrated Logo Mark: The Proxy Bridge 'X' -->
  <!-- Heavy Bracket (representing Codex/Structure, matching 900 weight) -->
  <path d="M 231 40 L 243 57 L 231 74" fill="none" stroke="#0A0A0A" stroke-width="16" stroke-linecap="butt" stroke-linejoin="round" />
  
  <!-- Light Bracket (representing Auth/Precision, matching 300 weight) -->
  <path d="M 269 40 L 257 57 L 269 74" fill="none" stroke="#0A0A0A" stroke-width="5" stroke-linecap="butt" stroke-linejoin="round" />

  <!-- Right Text: 'auth_' (Light Sans-Serif, hyphen removed for perfect spacing) -->
  <text x="278" y="74" class="font-base weight-light" text-anchor="start">auth_</text>
</svg>
